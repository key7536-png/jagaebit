<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자개빛 · 천운 — 100페이지 사주타로 리포트 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --gold:#C9A227; --gold-light:#F5D97A; --gold-dim:#7A5C0A;
  --bg:#0D0A06; --bg-card:#141009; --bg-panel:#1A1407; --bg-input:#1F180A;
  --bd:rgba(201,162,39,0.18); --bd-h:rgba(201,162,39,0.5);
  --tx:#F0E6CC; --tx2:#A08040; --tx3:#5A4520;
  --r:10px; --r-sm:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:.5px solid var(--bd);background:rgba(13,10,6,.95);position:sticky;top:0;z-index:200;backdrop-filter:blur(8px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#C9A227,#7A5C0A);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--gold)}
.logo-sub{font-size:10px;color:var(--tx2);margin-top:1px}
.hd-right{display:flex;align-items:center;gap:14px}
.api-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.dot{width:7px;height:7px;border-radius:50%;background:#C0392B;transition:background .3s}
.dot.on{background:#27AE60;box-shadow:0 0 5px rgba(39,174,96,.5)}
.layout{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 56px)}
.sidebar{border-right:.5px solid var(--bd);background:var(--bg-panel);overflow-y:auto;height:calc(100vh - 56px);padding:1.25rem;display:flex;flex-direction:column;gap:1rem}
.main{overflow-y:auto;height:calc(100vh - 56px);padding:1.25rem}
.panel{background:var(--bg-card);border:.5px solid var(--bd);border-radius:var(--r);padding:1.1rem}
.panel-hd{font-size:10px;font-weight:500;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
.panel-hd::before{content:'';display:block;width:14px;height:1px;background:var(--gold)}
label{font-size:11px;color:var(--tx2);display:block;margin-bottom:4px}
input,select,textarea{width:100%;background:var(--bg-input);border:.5px solid var(--bd);border-radius:var(--r-sm);color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--bd-h)}
input::placeholder{color:var(--tx3)}
select option{background:var(--bg-card)}
textarea{resize:vertical;min-height:60px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{margin-bottom:10px}
.sec-group{margin-bottom:1rem}
.sec-group-title{font-size:10px;font-weight:500;color:var(--tx2);letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.sec-items{display:flex;flex-direction:column;gap:4px}
.sec-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg-input);border:.5px solid var(--bd);border-radius:var(--r-sm);cursor:pointer;transition:all .15s}
.sec-item:hover{border-color:var(--bd-h)}
.sec-item.on{border-color:var(--gold);background:rgba(201,162,39,.07)}
.sec-cb{width:14px;height:14px;border-radius:3px;border:.5px solid var(--bd);background:var(--bg-input);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.sec-item.on .sec-cb{background:var(--gold);border-color:var(--gold);color:#0D0A06}
.sec-label{flex:1;font-size:11px;color:var(--tx)}
.sec-item.on .sec-label{color:var(--gold)}
.sec-pages{font-size:10px;color:var(--tx3)}
.sec-item.on .sec-pages{color:var(--tx2)}
.pg-ctrl{display:flex;align-items:center;gap:8px;margin-top:5px}
.pg-btn{width:26px;height:26px;border-radius:50%;border:.5px solid var(--bd);background:var(--bg-input);color:var(--gold);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pg-btn:hover{border-color:var(--gold)}
.pg-num{font-size:18px;font-weight:700;color:var(--gold);min-width:32px;text-align:center;font-family:'Noto Serif KR',serif}
.btn{font-family:'Noto Sans KR',sans-serif;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:none;padding:8px 14px}
.btn-gold{background:linear-gradient(135deg,#C9A227,#A07A10);color:#0D0A06;width:100%;padding:11px;font-size:14px;border-radius:var(--r)}
.btn-gold:hover{background:linear-gradient(135deg,#F5D97A,#C9A227)}
.btn-gold:disabled{background:var(--bg-input);color:var(--tx3);cursor:default}
.btn-outline{background:transparent;border:.5px solid var(--bd);color:var(--tx2);width:100%;padding:8px}
.btn-outline:hover{border-color:var(--bd-h);color:var(--gold)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.1rem}
.stat{background:var(--bg-card);border:.5px solid var(--bd);border-radius:var(--r);padding:.85rem;text-align:center}
.stat-v{font-size:24px;font-weight:700;color:var(--gold);font-family:'Noto Serif KR',serif}
.stat-l{font-size:10px;color:var(--tx2);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-size:11px;padding:5px 13px;border-radius:16px;border:.5px solid var(--bd);color:var(--tx2);cursor:pointer;background:var(--bg-input);transition:all .15s}
.tab:hover{border-color:var(--bd-h);color:var(--gold)}
.tab.active{background:rgba(201,162,39,.12);border-color:var(--gold);color:var(--gold)}
.cl{display:flex;flex-direction:column;gap:7px}
.ci{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg-input);border:.5px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all .15s}
.ci:hover,.ci.active{border-color:var(--bd-h);background:rgba(201,162,39,.04)}
.av{width:36px;height:36px;border-radius:50%;background:rgba(201,162,39,.12);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--gold);flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:500}
.ci-meta{font-size:10px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-badge{font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(201,162,39,.1);border:.5px solid var(--gold-dim);color:var(--gold);flex-shrink:0}
.del-btn{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:var(--tx3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-btn:hover{color:#C0392B;background:rgba(192,57,43,.1)}
.prog-wrap{background:var(--bg-input);border-radius:6px;height:5px;overflow:hidden;margin:6px 0}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:6px;transition:width .5s ease;width:0}
.prog-steps{display:flex;flex-direction:column;gap:4px;margin-top:.75rem;max-height:200px;overflow-y:auto}
.prog-step{display:flex;align-items:center;gap:8px;font-size:11px;padding:5px 0;border-bottom:.5px solid var(--bd)}
.step-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.step-label{flex:1;color:var(--tx2)}
.step-status{font-size:10px;flex-shrink:0}
.step-done .step-label{color:var(--tx)}
.step-active .step-label{color:var(--gold)}
.step-active .step-icon{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.result-panel{background:var(--bg-card);border:.5px solid var(--bd);border-radius:var(--r);padding:1.5rem}
.rs{margin-bottom:2rem}
.rs-title{font-size:15px;font-weight:700;color:var(--gold);font-family:'Noto Serif KR',serif;border-bottom:.5px solid var(--bd);padding-bottom:8px;margin-bottom:1rem;display:flex;align-items:center;gap:7px}
.rs-body{font-size:12.5px;line-height:2.2;color:var(--tx)}
.rs-body p{margin-bottom:.7rem;word-break:keep-all}
.rs-body .sub{font-size:12px;font-weight:700;color:var(--gold);font-family:'Noto Serif KR',serif;margin:.9rem 0 .3rem;padding-left:10px;border-left:2px solid var(--gold)}
.rs-body .hl{color:var(--gold-light);font-weight:600}
.rs-body .bracket{color:var(--gold);font-weight:600}
.divider{border:none;border-top:.5px solid var(--bd);margin:1.5rem 0}
.dl-btn{font-size:11px;padding:5px 12px;border-radius:14px;border:.5px solid var(--gold-dim);background:rgba(201,162,39,.1);color:var(--gold);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.dl-btn:hover{background:rgba(201,162,39,.2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:var(--bg-card);border:.5px solid var(--bd);border-radius:var(--r);padding:1.5rem;width:320px;max-width:90vw}
.modal-title{font-size:15px;font-weight:700;color:var(--gold);font-family:'Noto Serif KR',serif;margin-bottom:1rem;text-align:center}
.share-btns{display:flex;flex-direction:column;gap:8px}
.share-btn{width:100%;padding:11px;border-radius:var(--r-sm);border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.share-btn.pdf{background:linear-gradient(135deg,#C9A227,#A07A10);color:#0D0A06}
.share-btn.pdf:hover{opacity:.85}
.share-btn.kakao{background:#FEE500;color:#191919}
.share-btn.kakao:hover{opacity:.85}
.share-btn.email{background:var(--bg-input);border:.5px solid var(--bd);color:var(--tx)}
.share-btn.email:hover{border-color:var(--bd-h)}
.share-btn.copy{background:var(--bg-input);border:.5px solid var(--bd);color:var(--tx2)}
.share-btn.copy:hover{border-color:var(--bd-h)}
.modal-close{width:100%;padding:8px;margin-top:8px;border-radius:var(--r-sm);border:.5px solid var(--bd);background:transparent;color:var(--tx3);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.pdf-progress{display:none;text-align:center;padding:.75rem 0}
.pdf-prog-bar{height:4px;background:var(--bg-input);border-radius:2px;margin:.5rem 0;overflow:hidden}
.pdf-prog-fill{height:100%;background:var(--gold);border-radius:2px;width:0;transition:width .3s}
.saju-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:.6rem 0}
.pillar{background:var(--bg-input);border:.5px solid var(--bd);border-radius:var(--r-sm);padding:9px 5px;text-align:center}
.p-lbl{font-size:9px;color:var(--tx2);margin-bottom:4px}
.p-hanja{font-size:20px;color:var(--gold);font-family:'Noto Serif KR',serif;letter-spacing:-1px}
.p-kr{font-size:10px;color:var(--tx2);margin-top:3px}
.p-elem{font-size:9px;margin-top:3px;padding:1px 5px;border-radius:4px;display:inline-block}
.tarot-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin:.6rem 0}
.tc{flex-shrink:0;width:56px;padding:7px 4px;background:var(--bg-input);border:.5px solid var(--bd);border-radius:var(--r-sm);text-align:center;transition:all .15s}
.tc.key{border-color:var(--gold);background:rgba(201,162,39,.07)}
.tc-s{font-size:18px;margin-bottom:3px}
.tc-n{font-size:8px;color:var(--tx2);line-height:1.3}
.tc-p{font-size:8px;color:var(--tx3);margin-top:2px}
.daeun-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin:.5rem 0}
.du{flex-shrink:0;text-align:center;padding:5px 7px;background:var(--bg-input);border:.5px solid var(--bd);border-radius:var(--r-sm);min-width:42px}
.du-age{font-size:9px;color:var(--tx3)}
.du-h{font-size:14px;color:var(--gold);font-family:'Noto Serif KR',serif}
.du-kr{font-size:8px;color:var(--tx2)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--tx3);font-size:12px}
.empty-icon{font-size:34px;margin-bottom:.6rem;opacity:.35}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg-card);border:.5px solid var(--gold);color:var(--gold);padding:9px 18px;border-radius:20px;font-size:12px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.rl{display:flex;flex-direction:column;gap:7px}
.ri{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg-input);border:.5px solid var(--bd);border-radius:var(--r)}
.ri-info{flex:1}
.ri-name{font-size:12px;font-weight:500}
.ri-meta{font-size:10px;color:var(--tx2);margin-top:2px}
.sec-bar{background:rgba(201,162,39,.06);border:.5px solid var(--bd);border-radius:var(--r-sm);padding:.7rem;margin-bottom:.75rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sec-bar-num{font-size:18px;font-weight:700;color:var(--gold);font-family:'Noto Serif KR',serif}
.sec-bar-lbl{font-size:10px;color:var(--tx2)}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🔮</div><div><div class="logo-title">자개빛 · 천운</div><div class="logo-sub">사주·타로 100페이지 AI 리포트 시스템 v2.0</div></div></div>
  <div class="hd-right"><div class="api-pill"><div class="dot" id="api-dot"></div><span id="api-txt">Gemini 미연결</span></div><div style="font-size:10px;color:var(--tx2)" id="hd-date"></div></div>
</header>
<div class="layout">
<div class="sidebar">
  <div class="panel">
    <div class="panel-hd">Gemini API 설정</div>
    <div class="fg"><label>Gemini API Key</label><div style="display:flex;gap:6px"><input type="password" id="api-key" placeholder="AIzaSy..." style="flex:1;font-family:monospace;font-size:11px"><button class="btn" style="background:var(--bg-input);border:.5px solid var(--bd);color:var(--tx2);padding:0 12px;border-radius:var(--r-sm);cursor:pointer" onclick="connectApi()">연결</button></div></div>
    <div style="font-size:10px;color:var(--tx3)">키는 브라우저에 영구 저장됩니다.</div>
  </div>
  <div class="panel">
    <div class="panel-hd">고객 등록</div>
    <div class="fg"><label>이름</label><input id="c-name" type="text" placeholder="홍길동"></div>
    <div class="frow fg">
      <div><label>생년월일</label><input id="c-date" type="date"></div>
      <div><label>출생 시간</label><select id="c-time"><option value="">모름</option><option value="23">자시 23~01시</option><option value="1">축시 01~03시</option><option value="3">인시 03~05시</option><option value="5">묘시 05~07시</option><option value="7">진시 07~09시</option><option value="9">사시 09~11시</option><option value="11">오시 11~13시</option><option value="13">미시 13~15시</option><option value="15">신시 15~17시</option><option value="17">유시 17~19시</option><option value="19">술시 19~21시</option><option value="21">해시 21~23시</option></select></div>
    </div>
    <div class="frow fg">
      <div><label>성별</label><select id="c-gender"><option value="여">여성</option><option value="남">남성</option></select></div>
      <div><label>양력/음력</label><select id="c-cal"><option value="양">양력</option><option value="음">음력</option></select></div>
    </div>
    <div class="fg"><label>상담 요청 사항</label><textarea id="c-concern" placeholder="예) 전 남자친구와 재회 가능한지, 이직 시기..."></textarea></div>
    <div class="fg">
      <label style="margin-bottom:8px;display:block">섹션 선택 (멀티 API 호출)</label>
      <div class="sec-bar" id="sec-bar"><div><div class="sec-bar-num" id="sb-pages">0</div><div class="sec-bar-lbl">예상 페이지</div></div><div style="width:.5px;height:28px;background:var(--bd)"></div><div><div class="sec-bar-num" id="sb-secs">0</div><div class="sec-bar-lbl">섹션 수</div></div><div style="width:.5px;height:28px;background:var(--bd)"></div><div><div class="sec-bar-num" id="sb-apis">0</div><div class="sec-bar-lbl">API 호출</div></div></div>
      <div id="section-picker"></div>
    </div>
    <div class="fg"><label>PDF 페이지 수</label><div class="pg-ctrl" style="margin-top:5px"><button class="pg-btn" onclick="chgPage(-10)">−</button><span class="pg-num" id="pg-disp">30</span><button class="pg-btn" onclick="chgPage(10)">+</button><span style="font-size:10px;color:var(--tx3)">페이지 (10단위)</span></div><input type="range" min="10" max="100" step="10" value="30" id="pg-slider" oninput="syncPage(this.value)" style="margin-top:6px"></div>
    <div class="fg"><label>템플릿</label><select id="c-tmpl"><option value="gold">✦ 금박 테두리 (프리미엄)</option><option value="oriental">☯ 동양풍 (전통 먹)</option><option value="modern">◼ 모던 다크</option><option value="minimal">○ 미니멀</option></select></div>
    <button class="btn-outline" style="margin-bottom:8px" onclick="addCustomer()">+ 고객 추가</button>
    <button class="btn-gold" id="gen-btn" onclick="startGeneration()" disabled>🔮 AI 리포트 생성 시작</button>
    <button id="stop-btn" onclick="stopGeneration()" style="display:none;margin-top:8px;width:100%;padding:10px;border-radius:var(--r);border:1.5px solid #C0392B;background:rgba(192,57,43,0.1);color:#E74C3C;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s">⏹ 생성 중단</button>
  </div>
</div>
<div class="main">
  <div class="stats"><div class="stat"><div class="stat-v" id="st-c">0</div><div class="stat-l">등록 고객</div></div><div class="stat"><div class="stat-v" id="st-r">0</div><div class="stat-l">생성 리포트</div></div><div class="stat"><div class="stat-v" id="st-p">30</div><div class="stat-l">페이지/권</div></div><div class="stat"><div class="stat-v" id="st-t">0</div><div class="stat-l">오늘 생성</div></div></div>
  <div class="tabs"><div class="tab active" onclick="switchTab(this,'customers')">👥 고객 관리</div><div class="tab" onclick="switchTab(this,'reports')">📋 생성 리포트</div><div class="tab" onclick="switchTab(this,'preview')">🔍 미리보기</div></div>
  <div id="tab-customers"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:11px;color:var(--tx2)" id="cust-count-label">고객 0명 저장됨</div><button onclick="clearStorage()" style="font-size:10px;padding:3px 10px;border-radius:10px;border:.5px solid rgba(192,57,43,0.4);background:rgba(192,57,43,0.08);color:#E74C3C;cursor:pointer;font-family:'Noto Sans KR',sans-serif">🗑 전체 삭제</button></div><div class="cl" id="cust-list"><div class="empty"><div class="empty-icon">🌙</div>등록된 고객이 없습니다</div></div></div>
  <div id="tab-reports" style="display:none"><div class="rl" id="report-list"><div class="empty"><div class="empty-icon">📜</div>생성된 리포트가 없습니다</div></div></div>
  <div id="tab-preview" style="display:none"><div id="progress-area" style="display:none"><div class="panel" style="margin-bottom:1rem"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:500" id="prog-main">분석 시작 중...</span><span style="font-size:12px;color:var(--gold)" id="prog-pct">0%</span></div><div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div><div class="prog-steps" id="prog-steps"></div></div></div><div id="saju-preview-area"></div><div id="result-area"></div></div>
</div>

function fmtSaju(s){return s.map(p=>`${p.lbl} ${p.h}${p.e}(${p.hk}${p.ek},${p.elem||'?'})`).join(' / ');}

function calcSaju(dateStr,timeStr){
  const d=new Date(dateStr);const y=d.getFullYear(),m=d.getMonth()+1;
  const yHs=((y-4)%10+10)%10,yEb=((y-4)%12+12)%12;
  const mHsBase=(yHs%5)*2,mHs=(mHsBase+m-1)%10,mEb=(m+1)%12;
  const jd=Math.floor(d.getTime()/86400000)+25569;
  const dHs=((jd%10)+10)%10,dEb=((jd%12)+12)%12;
  const TM={'23':0,'1':1,'3':2,'5':3,'7':4,'9':5,'11':6,'13':7,'15':8,'17':9,'19':10,'21':11};
  const hasTime=timeStr&&TM[timeStr]!==undefined;
  const hEb=hasTime?TM[timeStr]:null;const hHs=hasTime?((dHs%5)*2+hEb)%10:null;
  return [
    {lbl:'연주',h:HS[yHs],e:EB[yEb],hk:HS_K[yHs],ek:EB_K[yEb],elem:ELEM[yHs],zodiac:ZOD[yEb]},
    {lbl:'월주',h:HS[mHs],e:EB[mEb],hk:HS_K[mHs],ek:EB_K[mEb],elem:ELEM[mHs],zodiac:''},
    {lbl:'일주',h:HS[dHs],e:EB[dEb],hk:HS_K[dHs],ek:EB_K[dEb],elem:ELEM[dHs],zodiac:''},
    {lbl:'시주',h:hasTime?HS[hHs]:'?',e:hasTime?EB[hEb]:'?',hk:hasTime?HS_K[hHs]:'미상',ek:hasTime?EB_K[hEb]:'',elem:hasTime?ELEM[hHs]:'',zodiac:''},
  ];
}

function calcDaeun(saju,gender,birthYear){
  const isYang=birthYear%2===0,isMale=gender==='남';
  const forward=(isMale&&isYang)||(!isMale&&!isYang);
  return Array.from({length:8},(_,i)=>{
    const age=(i+1)*10;const hi=forward?(i+2)%10:(10-i-1+10)%10;const ei=forward?(i+3)%12:(12-i-1+12)%12;
    return {age,h:HS[hi],e:EB[ei],hk:HS_K[hi],ek:EB_K[ei],elem:ELEM[hi]};
  });
}

function getTarot(dateStr){
  const seed=new Date(dateStr).getTime();
  const pos=['현재상황','장애/도전','무의식','과거영향','가능미래','속마음','나의자세','주변영향','희망/두려움','최종결과'];
  return pos.map((p,i)=>({pos:p,card:TAROT[Math.abs(Math.floor(seed/((i+1)*999983)))%TAROT.length],key:i===4||i===9}));
}

function md2html(txt){
  if(!txt)return '';
  return txt.replace(/^####\s*(.+)$/gm,'<div class="sub">$1</div>').replace(/^###\s*[◆♦✦*]?\s*(.+)$/gm,'<div class="sub">$1</div>').replace(/^##\s*(.+)$/gm,'<div class="sub">$1</div>').replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1</span>').replace(/【(.+?)】/g,'<span class="bracket">【$1】</span>').replace(/\n\n+/g,'</p><p>').replace(/^/,'<p>').replace(/$/,'</p>');
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('hd-date').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  buildSectionPicker();
  updateSecBar();
  const saved=localStorage.getItem('jgb_api');
  if(saved){document.getElementById('api-key').value=saved;connectApi(true);}
  loadFromStorage();

  /* ✅ 폼 값 자동 저장·복원 */
  ['c-name','c-date','c-time','c-gender','c-cal','c-concern'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const sv=localStorage.getItem('jgb_form_'+id);
    if(sv)el.value=sv;
    el.addEventListener('change',()=>localStorage.setItem('jgb_form_'+id,el.value));
    el.addEventListener('input',()=>localStorage.setItem('jgb_form_'+id,el.value));
  });

  const ak=document.getElementById('api-key');
  if(ak){
    ak.addEventListener('blur',()=>{if(ak.value.trim())connectApi(true);});
    ak.addEventListener('keydown',(e)=>{if(e.key==='Enter')connectApi(false);});
  }
});

function saveToStorage(){
  try{
    const custData=customers.map(c=>({id:c.id,name:c.name,date:c.date,time:c.time,gender:c.gender,cal:c.cal,concern:c.concern,sections:c.sections,pages:c.pages,template:c.template,createdAt:c.createdAt}));
    localStorage.setItem('jgb_customers',JSON.stringify(custData));
    const repMeta=reports.map(r=>({id:r.id,custId:r.custId,custName:r.custName,date:r.date,pages:r.pages,template:r.template,sections:r.sections}));
    localStorage.setItem('jgb_reports_meta',JSON.stringify(repMeta));
  }catch(e){console.warn('저장 실패:',e);}
}

function loadFromStorage(){
  try{
    const custRaw=localStorage.getItem('jgb_customers');
    if(custRaw){customers=JSON.parse(custRaw).map(c=>{const saju=calcSaju(c.date,c.time);const daeun=calcDaeun(saju,c.gender,new Date(c.date).getFullYear());const tarot=getTarot(c.date);return {...c,saju,daeun,tarot};});if(customers.length)showToast(`✓ 고객 ${customers.length}명 복원됨`);}
    const repRaw=localStorage.getItem('jgb_reports_meta');
    if(repRaw)reports=JSON.parse(repRaw).map(r=>({...r,results:[]}));
    renderAll();
  }catch(e){console.warn('불러오기 실패:',e);}
}

function clearStorage(){
  if(!confirm('모든 고객 데이터를 삭제하시겠습니까?'))return;
  localStorage.removeItem('jgb_customers');localStorage.removeItem('jgb_reports_meta');
  customers=[];reports=[];selectedCustomer=null;renderAll();showToast('✓ 전체 삭제 완료');
}

function buildSectionPicker(){
  const groups={};ALL_SECTIONS.forEach(s=>{if(!groups[s.group])groups[s.group]=[];groups[s.group].push(s);});
  document.getElementById('section-picker').innerHTML=Object.entries(groups).map(([g,secs])=>`<div class="sec-group"><div class="sec-group-title"><span>${g}</span><span style="font-size:9px;color:var(--tx3)">${secs.reduce((a,s)=>a+s.pages,0)}p</span></div><div class="sec-items">${secs.map(s=>`<div class="sec-item ${selectedSections.has(s.id)?'on':''}" onclick="toggleSec('${s.id}',this)"><div class="sec-cb">${selectedSections.has(s.id)?'✓':''}</div><span class="sec-label">${s.icon} ${s.name}</span><span class="sec-pages">~${s.pages}p</span></div>`).join('')}</div></div>`).join('');
}

function toggleSec(id,el){
  if(selectedSections.has(id)){selectedSections.delete(id);el.classList.remove('on');el.querySelector('.sec-cb').textContent='';}
  else{selectedSections.add(id);el.classList.add('on');el.querySelector('.sec-cb').textContent='✓';}
  updateSecBar();
}

function updateSecBar(){
  const secs=ALL_SECTIONS.filter(s=>selectedSections.has(s.id));
  document.getElementById('sb-pages').textContent=secs.reduce((a,s)=>a+s.pages,0);
  document.getElementById('sb-secs').textContent=secs.length;
  document.getElementById('sb-apis').textContent=secs.length;
}

function connectApi(silent=false){
  const k=document.getElementById('api-key').value.trim();
  if(!k){showToast('API 키를 입력해 주세요');return;}
  apiKey=k;localStorage.setItem('jgb_api',k);
  document.getElementById('api-dot').classList.add('on');
  document.getElementById('api-txt').textContent='Gemini 연결됨';
  if(!silent)showToast('✓ Gemini 연결 완료 — 영구 저장됨');
  updateGenBtn();
}

async function callClaude(prompt,retries=3){
  for(let attempt=1;attempt<=retries;attempt++){
    try{
      const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${apiKey}`;
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:8000,temperature:0.85}})});
      const d=await res.json();
      if(!res.ok){
        const errMsg=d.error?.message||`HTTP ${res.status}`;
        if((res.status===429||res.status===503)&&attempt<retries){const wait=attempt*8000;document.getElementById('prog-main').textContent=`⏳ Rate Limit — ${wait/1000}초 후 재시도...`;await new Promise(r=>setTimeout(r,wait));continue;}
        throw new Error(errMsg);
      }
      const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
      if(!text)throw new Error('Gemini 응답이 비어있습니다');
      return text;
    }catch(e){if(attempt===retries)throw e;await new Promise(r=>setTimeout(r,attempt*5000));}
  }
}

function chgPage(d){pageCount=Math.min(100,Math.max(10,pageCount+d));document.getElementById('pg-disp').textContent=pageCount;document.getElementById('pg-slider').value=pageCount;document.getElementById('st-p').textContent=pageCount;}

function addCustomer(){
  const name=document.getElementById('c-name').value.trim();
  const date=document.getElementById('c-date').value;
  if(!name){showToast('이름을 입력해 주세요');return;}
  if(!date){showToast('생년월일을 선택해 주세요');return;}
  const time=document.getElementById('c-time').value;
  const gender=document.getElementById('c-gender').value;
  const cal=document.getElementById('c-cal').value;
  const concern=document.getElementById('c-concern').value.trim();
  const saju=calcSaju(date,time);const daeun=calcDaeun(saju,gender,new Date(date).getFullYear());const tarot=getTarot(date);
  customers.push({id:Date.now(),name,date,time,gender,cal,concern,sections:[...selectedSections],pages:pageCount,template:document.getElementById('c-tmpl').value,saju,daeun,tarot,createdAt:new Date().toLocaleString('ko-KR')});
  selectedCustomer=customers[customers.length-1];
  renderAll();saveToStorage();
  /* ✅ 폼 초기화 제거 — 입력값 유지 */
  showToast(`✓ ${name} 등록 완료`);
}

function delCustomer(id,e){
  e.stopPropagation();const c=customers.find(x=>x.id===id);customers=customers.filter(x=>x.id!==id);
  if(selectedCustomer?.id===id)selectedCustomer=null;renderAll();saveToStorage();if(c)showToast(`✓ ${c.name} 삭제 완료`);
}

function selectCustomer(id){selectedCustomer=customers.find(c=>c.id===id);renderAll();showSajuPreview();switchTab(document.querySelector('.tab[onclick*="preview"]'),'preview');}
function renderAll(){updateStats();renderCustomerList();renderReportList();updateGenBtn();}

  const el=document.getElementById('cust-list');const lbl=document.getElementById('cust-count-label');
  if(lbl)lbl.textContent=customers.length?`고객 ${customers.length}명 저장됨`:'고객 0명 저장됨';

function renderReportList(){

}

function updateStats(){document.getElementById('st-c').textContent=customers.length;document.getElementById('st-r').textContent=reports.length;document.getElementById('st-p').textContent=pageCount;document.getElementById('st-t').textContent=todayCount;}

function stopGeneration(){if(!isGenerating)return;stopRequested=true;document.getElementById('stop-btn').textContent='⏹ 정지 중...';document.getElementById('stop-btn').disabled=true;showToast('⏹ 다음 섹션 전에 중단됩니다...');}

async function startGeneration(){
  if(!selectedCustomer){showToast('고객을 선택해 주세요');return;}
  if(!apiKey){showToast('API 키를 먼저 연결해 주세요');return;}
  if(isGenerating){showToast('이미 생성 중입니다');return;}
  const c=selectedCustomer;const secList=ALL_SECTIONS.filter(s=>selectedSections.has(s.id));
  if(!secList.length){showToast('섹션을 1개 이상 선택해 주세요');return;}
  isGenerating=true;stopRequested=false;
  const genBtn=document.getElementById('gen-btn');const stopBtn=document.getElementById('stop-btn');
  genBtn.disabled=true;genBtn.textContent='🔄 생성 중...';stopBtn.style.display='block';stopBtn.textContent='⏹ 생성 중단';stopBtn.disabled=false;
  switchTab(document.querySelector('.tab[onclick*="preview"]'),'preview');
  document.getElementById('saju-preview-area').innerHTML='';document.getElementById('result-area').innerHTML='';document.getElementById('progress-area').style.display='block';
  document.getElementById('prog-steps').innerHTML=secList.map(s=>`<div class="prog-step" id="step-${s.id}"><div class="step-icon">⏳</div><div class="step-label">${s.icon} ${s.name}</div><div class="step-status" style="color:var(--tx3)">대기</div></div>`).join('');
  const results=[];let failed=[];
  for(let i=0;i<secList.length;i++){
    if(stopRequested){document.getElementById('prog-main').textContent=`⏹ ${i}개 섹션에서 중단됨`;secList.slice(i).forEach(s=>{const el=document.getElementById('step-'+s.id);if(el){el.querySelector('.step-icon').textContent='⛔';el.querySelector('.step-status').textContent='취소됨';}});break;}
    const sec=secList[i];const pct=Math.round((i/secList.length)*100);
    document.getElementById('prog-main').textContent=`${sec.icon} ${sec.name} 분석 중... (${i+1}/${secList.length})`;
    document.getElementById('prog-pct').textContent=pct+'%';document.getElementById('prog-bar').style.width=pct+'%';
    const stepEl=document.getElementById('step-'+sec.id);
    if(stepEl){stepEl.className='prog-step step-active';stepEl.querySelector('.step-icon').textContent='⚡';stepEl.querySelector('.step-status').textContent='분석 중...';stepEl.querySelector('.step-status').style.color='var(--gold)';stepEl.scrollIntoView({block:'nearest'});}
    try{
      const text=await callClaude(sec.prompt(c,c.saju,c.daeun,c.tarot));results.push({sec,text});
      if(stepEl){stepEl.className='prog-step step-done';stepEl.querySelector('.step-icon').textContent='✅';stepEl.querySelector('.step-status').textContent=`완료 (~${sec.pages}p)`;stepEl.querySelector('.step-status').style.color='#27AE60';}
    }catch(err){
      failed.push(sec.name);results.push({sec,text:`[${sec.name} — 오류: ${err.message}]`});
      if(stepEl){stepEl.querySelector('.step-icon').textContent='⚠️';stepEl.querySelector('.step-status').textContent='오류';}
    }
    if(i<secList.length-1&&!stopRequested)await new Promise(r=>setTimeout(r,2500));
  }
  isGenerating=false;stopRequested=false;
  genBtn.disabled=false;genBtn.textContent=selectedCustomer?`🔮 ${selectedCustomer.name} 리포트 생성`:'🔮 AI 리포트 생성 시작';stopBtn.style.display='none';
  if(!results.length){document.getElementById('progress-area').style.display='none';showToast('생성된 섹션이 없습니다');return;}
  document.getElementById('prog-main').textContent=`✓ ${results.length}개 섹션 완료!`;document.getElementById('prog-pct').textContent='100%';document.getElementById('prog-bar').style.width='100%';
  setTimeout(()=>{document.getElementById('progress-area').style.display='none';renderResult(c,results);saveReport(c,results);todayCount++;updateStats();showToast(failed.length?`리포트 완성! (오류 ${failed.length}개)`:`✓ ${results.length}개 섹션 완성!`);},800);
}

function renderResult(c,results){
  const el=document.getElementById('result-area');const today=new Date().toLocaleDateString('ko-KR');const totalPages=results.reduce((a,r)=>a+r.sec.pages,0);
  el.innerHTML=`<div class="result-panel"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:.5px solid var(--bd)"><div><div style="font-size:20px;font-weight:700;font-family:'Noto Serif KR',serif;color:var(--gold);margin-bottom:5px">🔮 ${c.name} 님의 사주·타로 종합 리포트</div><div style="font-size:11px;color:var(--tx2)">${c.cal}력 ${c.date} · ${c.gender}성 · ${results.length}섹션 · 약 ${totalPages}p · ${today}</div></div><button class="dl-btn" style="flex-shrink:0;margin-left:12px" onclick="openShareModal(${c.id})">📤 저장·공유</button></div>${results.map((r,i)=>`<div class="rs"><div class="rs-title">${r.sec.icon} ${r.sec.name}</div><div class="rs-body">${md2html(r.text)}</div></div>${i<results.length-1?'<hr class="divider">':''}`).join('')}<hr class="divider"><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:10px;color:var(--tx3)">자개빛·천운 | ${today}</div><button class="dl-btn" onclick="openShareModal(${c.id})">📤 저장·공유</button></div></div>`;
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

function saveReport(c,results){reports.push({id:Date.now(),custId:c.id,custName:c.name,date:new Date().toLocaleString('ko-KR'),pages:c.pages,template:c.template,sections:c.sections,results});renderReportList();updateStats();saveToStorage();}

let _shareCustomer=null,_shareResults=null;

function openShareModal(custId){const c=customers.find(x=>x.id===custId);const r=reports.find(x=>x.custId===custId);if(!c||!r){showToast('리포트를 먼저 생성해 주세요');return;}  _shareCustomer=c;_shareResults=r.results;document.getElementById('pdf-progress').style.display='none';document.getElementById('share-btns').style.display='flex';document.getElementById('share-modal').classList.add('show');}
function openShareModalByReport(reportId){const r=reports.find(x=>x.id===reportId);const c=customers.find(x=>x.id===r?.custId);if(!c||!r){showToast('데이터 없음');return;}_shareCustomer=c;_shareResults=r.results;document.getElementById('pdf-progress').style.display='none';document.getElementById('share-btns').style.display='flex';document.getElementById('share-modal').classList.add('show');}
function closeShareModal(){document.getElementById('share-modal').classList.remove('show');}

function doCopyText(){if(!_shareResults)return;const text=_shareResults.map(r=>`\n\n===== ${r.sec.name} =====\n\n${r.text}`).join('');navigator.clipboard.writeText(`자개빛·천운 리포트\n${_shareCustomer.name} 님 | ${_shareCustomer.date}\n${text}`).then(()=>{showToast('✓ 전체 복사 완료! 카톡·메모장에 붙여넣기');closeShareModal();}).catch(()=>showToast('복사 실패'));}
function doEmailShare(){if(!_shareCustomer||!_shareResults)return;const subject=encodeURIComponent(`[자개빛·천운] ${_shareCustomer.name}님 리포트`);const body=encodeURIComponent(`자개빛·천운 ${_shareCustomer.name}님 사주·타로 리포트\n\n`+_shareResults.map(r=>`■ ${r.sec.name}\n${r.text.slice(0,200)}...\n`).join('\n'));window.open(`mailto:?subject=${subject}&body=${body}`);showToast('이메일 앱이 열립니다');}
function doKakaoShare(){if(!_shareCustomer||!_shareResults)return;const preview=_shareResults.slice(0,2).map(r=>`[${r.sec.name}]\n${r.text.slice(0,150)}...`).join('\n\n');const text=`🔮 자개빛·천운\n${_shareCustomer.name}님 사주·타로\n\n${preview}\n\nhttps://자개빛.shop`;navigator.clipboard.writeText(text).then(()=>{showToast('✓ 카톡 내용 복사! 붙여넣기하세요');closeShareModal();}).catch(()=>showToast('복사 실패'));}

async function doDownloadPDF(){
  if(!_shareCustomer||!_shareResults)return;
  const c=_shareCustomer,results=_shareResults;
  document.getElementById('share-btns').style.display='none';document.getElementById('pdf-progress').style.display='block';
  const fill=document.getElementById('pdf-prog-fill');const txt=document.getElementById('pdf-prog-txt');
  const setP=(pct,msg)=>{fill.style.width=pct+'%';txt.textContent=msg;};
  setP(10,'PDF 레이아웃 구성 중...');
  const T={gold:{bg:'#0D0A06',ac:'#C9A227',acl:'#F5D97A',tx:'#F0E6CC',sub:'#A08040',mu:'#5A4520',cb:'#1A1407',bd:'rgba(201,162,39,0.25)'},oriental:{bg:'#0A0805',ac:'#C8541C',acl:'#E8845C',tx:'#EBD8C8',sub:'#A06840',mu:'#6A4030',cb:'#150E08',bd:'rgba(200,84,28,0.25)'},modern:{bg:'#0F0F14',ac:'#6496DC',acl:'#94C6FF',tx:'#E6E6F0',sub:'#828CA0',mu:'#4A5060',cb:'#181820',bd:'rgba(100,150,220,0.25)'},minimal:{bg:'#FAF8F4',ac:'#5A3C14',acl:'#8A6C44',tx:'#1E1910',sub:'#7A6040',mu:'#B09070',cb:'#F0EBE0',bd:'rgba(90,60,20,0.2)'}}[c.template]||{bg:'#0D0A06',ac:'#C9A227',acl:'#F5D97A',tx:'#F0E6CC',sub:'#A08040',mu:'#5A4520',cb:'#1A1407',bd:'rgba(201,162,39,0.25)'};
  const t=T;const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  setP(25,'페이지 구성 중...');
  const container=document.createElement('div');container.style.cssText='width:210mm;font-family:Arial,sans-serif;background:#fff;color:#1a1a1a';
  container.innerHTML+=`<div style="width:210mm;min-height:297mm;background:${t.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40mm 20mm;page-break-after:always;-webkit-print-color-adjust:exact;print-color-adjust:exact"><div style="font-size:28px;font-weight:700;color:${t.ac};margin-bottom:8px">자개빛 · 천운</div><div style="font-size:13px;color:${t.sub};margin-bottom:32px">사주 · 타로 종합 운세 리포트</div><div style="width:40px;height:1px;background:${t.ac};margin:0 auto 32px"></div><div style="font-size:26px;font-weight:700;color:${t.tx};margin-bottom:10px">${c.name} 님</div><div style="font-size:12px;color:${t.sub};margin-bottom:8px">${c.cal}력 ${c.date} | ${c.gender}성</div><div style="font-size:11px;color:${t.mu};margin-top:24px">총 ${results.length}개 섹션 | 발행: ${today}</div><div style="font-size:10px;color:${t.mu};margin-top:6px">자개빛.shop · 천기반전</div></div>`;
  setP(40,'섹션 내용 구성 중...');
  results.forEach((r,i)=>{const cleanText=r.text.replace(/###?\s*[◆♦✦*]?\s*(.+)/g,'<strong style="display:block;margin:12px 0 4px;color:'+t.ac+'">$1</strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/【(.+?)】/g,'<span style="color:'+t.ac+'">【$1】</span>').replace(/\n/g,'<br>');container.innerHTML+=`<div style="width:210mm;min-height:297mm;background:${t.bg};padding:18mm;page-break-after:always;-webkit-print-color-adjust:exact;print-color-adjust:exact;box-sizing:border-box"><div style="font-size:14px;font-weight:700;color:${t.ac};border-bottom:1px solid ${t.bd};padding-bottom:8px;margin-bottom:16px">${r.sec.icon} ${r.sec.name}</div><div style="font-size:12px;line-height:2.1;color:${t.tx};word-break:keep-all">${cleanText}</div><div style="position:absolute;bottom:12mm;left:18mm;right:18mm;border-top:1px solid ${t.bd};padding-top:3mm;font-size:9px;color:${t.mu};display:flex;justify-content:space-between"><span>자개빛·천운</span><span>${i+1}/${results.length}</span><span>${today}</span></div></div>`;});
  container.innerHTML+=`<div style="width:210mm;min-height:297mm;background:${t.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40mm 20mm;-webkit-print-color-adjust:exact;print-color-adjust:exact"><div style="font-size:48px;margin-bottom:20px">🔮</div><div style="font-size:22px;font-weight:700;color:${t.ac};margin-bottom:14px">천운의 마음을 담아</div><div style="font-size:13px;color:${t.sub};line-height:2.3">${c.name} 님의 앞날에<br>밝은 기운이 가득하길 바랍니다.</div><div style="font-size:11px;color:${t.mu};margin-top:28px">자개빛.shop | ${today}</div></div>`;
  setP(60,'PDF 렌더링 중...');document.body.appendChild(container);
  try{await html2pdf().set({margin:0,filename:`자개빛_${c.name}_리포트.pdf`,image:{type:'jpeg',quality:0.92},html2canvas:{scale:1.5,useCORS:true,logging:false},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['avoid-all','css','legacy']}}).from(container).save();setP(100,'✓ 완료!');showToast('✓ PDF 다운로드 완료!');setTimeout(()=>closeShareModal(),1200);}catch(e){showToast('PDF 오류: '+e.message);}finally{document.body.removeChild(container);}
}

function generatePDF(c,results){openShareModal(c.id);}

function switchTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  ['customers','reports','preview'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});
}
</script>
</body>
</html>
