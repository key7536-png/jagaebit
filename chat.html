<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>자개빛 1:1 상담 채팅방</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
:root{--bg:#0a0300;--gold:#c8960a;--gold2:#e8a80a;--cream:#f5ecd7;--border:rgba(200,150,10,0.25);--teal:#1d4a4a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--cream)}

/* 배경 패턴 */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 15% 15%,rgba(200,150,10,0.07) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 85%,rgba(29,74,74,0.07) 0%,transparent 55%);pointer-events:none}

/* 자개 패턴 */
.jagae-pat{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.035}
.jagae-pat svg{width:100%;height:100%}

/* 프레임 */
.frame{position:fixed;inset:0;pointer-events:none;z-index:1}
.frame::before{content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;border:1px solid rgba(200,150,10,0.32)}
.frame::after{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;border:.5px solid rgba(200,150,10,0.12)}

/* 앱 래퍼 */
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;z-index:2}

/* 헤더 */
.chat-hdr{background:linear-gradient(180deg,#080100,#100500);border-bottom:1px solid var(--border);padding:12px 14px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-size:18px;border:1.5px solid rgba(200,150,10,0.5);flex-shrink:0}
.chat-name{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--gold);font-weight:700}
.chat-status{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(245,236,215,0.5);margin-top:2px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4caf50}
.status-dot.off{background:#888}
.hdr-right{margin-left:auto;font-family:'Noto Serif KR',serif;font-size:18px;color:var(--gold);letter-spacing:2px}

/* 이름 입력 화면 */
.name-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#080100,#100500)}
.name-box{width:100%;max-width:340px;text-align:center}
.name-title{font-family:'Noto Serif KR',serif;font-size:22px;color:var(--gold);margin-bottom:6px;text-shadow:0 0 12px rgba(200,150,10,0.3)}
.name-sub{font-size:12px;color:rgba(245,236,215,0.55);line-height:1.8;margin-bottom:22px}
.name-ornament{font-size:40px;margin-bottom:14px}
.ni{width:100%;padding:13px 15px;background:rgba(255,255,255,0.05);border:1px solid rgba(200,150,10,0.25);border-radius:6px;color:var(--cream);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;text-align:center;letter-spacing:1px;margin-bottom:14px}
.ni:focus{border-color:rgba(200,150,10,0.55)}
.ni::placeholder{color:rgba(200,150,10,0.28);letter-spacing:0}
.ni-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:6px;color:#1a0a00;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;letter-spacing:1px;position:relative;overflow:hidden}
.ni-btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);animation:shim 2s infinite}
@keyframes shim{to{left:150%}}
.ni-notice{font-size:10px;color:rgba(200,150,10,0.35);margin-top:12px;line-height:1.7}

/* 채팅 영역 */
.chat-area{display:none;flex:1;flex-direction:column;overflow:hidden}
.chat-area.show{display:flex}

/* 상단 배너 */
.consult-banner{padding:8px 14px;background:rgba(200,150,10,0.06);border-bottom:1px solid rgba(200,150,10,0.12);text-align:center;font-size:10px;color:rgba(200,150,10,0.5)}

/* 메시지 영역 */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(200,150,10,0.18);border-radius:3px}

/* 날짜 구분선 */
.date-div{text-align:center;margin:4px 0}
.date-div span{font-size:9px;color:rgba(200,150,10,0.35);padding:3px 10px;background:rgba(200,150,10,0.06);border-radius:10px}

/* 메시지 버블 */
.msg{display:flex;flex-direction:column;max-width:78%;gap:3px}
.msg.me{align-self:flex-end}
.msg.them{align-self:flex-start}
.msg-row{display:flex;align-items:flex-end;gap:6px}
.msg.me .msg-row{flex-direction:row-reverse}
.bubble{padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.65;word-break:break-word}
.msg.me .bubble{background:linear-gradient(135deg,rgba(45,74,74,0.7),rgba(30,60,60,0.8));border:1px solid rgba(29,74,74,0.5);border-top-right-radius:3px;color:var(--cream)}
.msg.them .bubble{background:rgba(200,150,10,0.1);border:1px solid rgba(200,150,10,0.2);border-top-left-radius:3px;color:var(--cream)}
.msg-time{font-size:9px;color:rgba(200,150,10,0.35);flex-shrink:0}
.msg-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid rgba(200,150,10,0.3)}
.read-receipt{font-size:9px;color:rgba(200,150,10,0.4);text-align:right}

/* 타이핑 */
.typing{display:flex;align-items:center;gap:4px;padding:10px 13px;background:rgba(200,150,10,0.08);border:1px solid rgba(200,150,10,0.15);border-radius:16px;border-top-left-radius:3px;width:fit-content}
.tdot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:td 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* 시스템 메시지 */
.sys-msg{text-align:center;padding:5px 10px}
.sys-msg span{font-size:10px;color:rgba(200,150,10,0.4);padding:3px 12px;background:rgba(200,150,10,0.05);border-radius:10px;border:1px solid rgba(200,150,10,0.1)}

/* 입력창 */
.input-area{padding:10px 12px;border-top:1px solid var(--border);background:rgba(8,3,0,0.9);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.msg-input{flex:1;padding:10px 13px;background:rgba(255,255,255,0.05);border:1px solid rgba(200,150,10,0.2);border-radius:20px;color:var(--cream);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;max-height:100px;min-height:38px;line-height:1.5}
.msg-input:focus{border-color:rgba(200,150,10,0.45)}
.msg-input::placeholder{color:rgba(200,150,10,0.28)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.send-btn:hover{transform:scale(1.08)}
.send-btn:disabled{opacity:.4;transform:none}

/* 퀵 리플라이 */
.quick-area{display:flex;gap:6px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:.5px solid rgba(200,150,10,0.08)}
.quick-area::-webkit-scrollbar{display:none}
.qbtn{flex:none;padding:5px 10px;background:rgba(200,150,10,0.09);border:1px solid rgba(200,150,10,0.2);border-radius:12px;color:rgba(200,150,10,0.7);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif}
.qbtn:hover{background:rgba(200,150,10,0.18);color:var(--gold)}

/* 연결 상태 */
.conn-bar{text-align:center;padding:5px;font-size:10px;display:none}
.conn-bar.show{display:block}
.conn-bar.connecting{color:rgba(255,200,0,0.7);background:rgba(255,200,0,0.06)}
.conn-bar.error{color:rgba(255,100,100,0.7);background:rgba(255,100,100,0.06)}
</style>
</head>
<body>
<div class="jagae-pat">
  <svg viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">
    <defs><pattern id="jp" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30,8 L52,30 L30,52 L8,30 Z" fill="none" stroke="#c8960a" stroke-width=".5"/>
      <circle cx="30" cy="30" r="5" fill="none" stroke="#c8960a" stroke-width=".3"/>
    </pattern></defs>
    <rect width="100%" height="100%" fill="url(#jp)"/>
  </svg>
</div>
<div class="frame"></div>

<div class="app">
  <!-- 헤더 -->
  <div class="chat-hdr">
    <div class="hdr-top">
      <button class="back-btn" onclick="history.back()">←</button>
      <div class="avatar">🔮</div>
      <div>
        <div class="chat-name">타로냥 · 자개빛 상담</div>
        <div class="chat-status"><span class="status-dot" id="statusDot"></span><span id="statusTxt">연결 중...</span></div>
      </div>
      <div class="hdr-right">자개빛</div>
    </div>
  </div>

  <div class="conn-bar" id="connBar"></div>

  <!-- 이름 입력 화면 -->
  <div class="name-screen" id="nameScreen">
    <div class="name-box">
      <div class="name-ornament">🌸</div>
      <div class="name-title">자개빛 1:1 상담방</div>
      <div class="name-sub">상담권을 구매하신 고객님,<br>환영합니다 💫<br><br>입장하시기 전 닉네임을 입력해주세요</div>
      <input class="ni" id="nickInput" placeholder="닉네임 (예: 봄날의달)" maxlength="10" onkeydown="if(event.key==='Enter')enterChat()">
      <button class="ni-btn" onclick="enterChat()">상담방 입장 →</button>
      <div class="ni-notice">닉네임은 상담사에게만 표시되며<br>개인정보는 수집하지 않습니다</div>
    </div>
  </div>

  <!-- 채팅 영역 -->
  <div class="chat-area" id="chatArea">
    <div class="consult-banner" id="bannerTxt">타로냥과 1:1 상담 중 · 상담 내용은 비공개입니다</div>
    <div class="quick-area">
      <button class="qbtn" onclick="sendQuick('안녕하세요! 상담 시작할게요 🌸')">인사하기</button>
      <button class="qbtn" onclick="sendQuick('올해 제 운세가 어떤지 봐주세요')">운세 상담</button>
      <button class="qbtn" onclick="sendQuick('연애운에 대해 상담받고 싶어요')">연애운</button>
      <button class="qbtn" onclick="sendQuick('재물운과 직업운을 알고 싶어요')">재물·직업운</button>
      <button class="qbtn" onclick="sendQuick('사주 분석 부탁드려요')">사주 분석</button>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="input-area">
      <textarea class="msg-input" id="msgInput" placeholder="메시지를 입력하세요..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
// ── Firebase ──
const fbCfg = {
  apiKey: "demo",
  authDomain: "jagaebit.firebaseapp.com",
  databaseURL: "https://jagaebit-default-rtdb.firebaseio.com",
  projectId: "jagaebit"
};
let db, fbOk = false;
try {
  if (!firebase.apps.length) firebase.initializeApp(fbCfg);
  db = firebase.database();
  fbOk = true;
} catch(e) {}

// ── 상태 ──
let myNick = localStorage.getItem('jb_nick') || '';
let roomId = 'room_general'; // 실제로는 상담권 구매 ID로 고유 생성
let msgListener = null;

// ── 입장 ──
function enterChat() {
  const n = document.getElementById('nickInput').value.trim();
  if (!n) { document.getElementById('nickInput').style.borderColor='rgba(255,100,100,0.5)'; return; }
  myNick = n;
  localStorage.setItem('jb_nick', n);
  roomId = 'room_' + n.replace(/[^a-zA-Z0-9가-힣]/g,'') + '_' + Date.now().toString(36);
  localStorage.setItem('jb_room', roomId);
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('chatArea').classList.add('show');
  initChat();
}

// 이미 닉네임 있으면 바로 진입
if (myNick) {
  roomId = localStorage.getItem('jb_room') || roomId;
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('chatArea').classList.add('show');
  document.getElementById('nickInput').value = myNick;
}

function initChat() {
  document.getElementById('bannerTxt').textContent = `${myNick}님의 1:1 상담방 · 상담 내용은 비공개입니다`;
  updateStatus('online');
  // 입장 메시지 전송
  sendSysMsg(`${myNick}님이 상담방에 입장했습니다 🌸`);
  if (fbOk) {
    subscribeMessages();
  } else {
    // localStorage 폴백
    updateStatus('local');
    loadLocalMsgs();
  }
}

// ── Firebase 메시지 구독 ──
function subscribeMessages() {
  if (msgListener) msgListener();
  const ref = db.ref('chats/' + roomId + '/messages');
  document.getElementById('msgs').innerHTML = '';
  ref.orderByChild('ts').on('value', snap => {
    document.getElementById('msgs').innerHTML = '';
    snap.forEach(child => renderMsg(child.val()));
    scrollBottom();
    updateStatus('online');
  });
  // 방 메타 등록
  db.ref('chats/' + roomId + '/meta').set({ nick: myNick, ts: Date.now(), active: true });
  // 관리자 알림
  db.ref('admin_notify/new_chat').set({ nick: myNick, room: roomId, ts: Date.now() });
}

// ── 메시지 전송 ──
function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = '38px';
  const msg = { text, sender: myNick, role: 'user', ts: Date.now(), time: fmtTime(new Date()) };
  if (fbOk) {
    db.ref('chats/' + roomId + '/messages').push(msg);
  } else {
    saveLocalMsg(msg); renderMsg(msg); scrollBottom();
  }
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMsg();
}

function sendSysMsg(text) {
  const msg = { text, role: 'system', ts: Date.now(), time: fmtTime(new Date()) };
  if (fbOk) db.ref('chats/' + roomId + '/messages').push(msg);
  else { saveLocalMsg(msg); renderMsg(msg); scrollBottom(); }
}

// ── 메시지 렌더 ──
function renderMsg(m) {
  const container = document.getElementById('msgs');
  if (m.role === 'system') {
    const d = document.createElement('div');
    d.className = 'sys-msg';
    d.innerHTML = `<span>${m.text}</span>`;
    container.appendChild(d);
    return;
  }
  const isMe = m.role === 'user';
  const d = document.createElement('div');
  d.className = 'msg ' + (isMe ? 'me' : 'them');
  d.innerHTML = `
    <div class="msg-row">
      ${!isMe ? `<div class="msg-av">🔮</div>` : ''}
      <div class="bubble">${escHtml(m.text)}</div>
      ${isMe ? '' : ''}
    </div>
    <div class="msg-time" style="${isMe?'text-align:right':''}">${m.time||''}</div>`;
  container.appendChild(d);
}

// ── localStorage 폴백 ──
function saveLocalMsg(msg) {
  const key = 'jb_msgs_' + roomId;
  const msgs = JSON.parse(localStorage.getItem(key) || '[]');
  msgs.push(msg);
  localStorage.setItem(key, JSON.stringify(msgs));
}
function loadLocalMsgs() {
  const key = 'jb_msgs_' + roomId;
  const msgs = JSON.parse(localStorage.getItem(key) || '[]');
  msgs.forEach(renderMsg);
  if (!msgs.length) {
    renderMsg({role:'them',sender:'타로냥',text:'안녕하세요 💫 자개빛 상담사 타로냥이에요.\n지금은 오프라인 모드입니다. 실시간 연결을 위해 Firebase를 설정해주세요.\n무엇이든 편하게 여쭤보세요 🌸',time:fmtTime(new Date())});
  }
  scrollBottom();
}

// ── 상태 ──
function updateStatus(s) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  if (s === 'online') { dot.className = 'status-dot'; txt.textContent = '상담 가능' }
  else if (s === 'local') { dot.className = 'status-dot off'; txt.textContent = '오프라인 모드' }
  else { dot.className = 'status-dot off'; txt.textContent = '연결 중...' }
}

// ── 유틸 ──
function fmtTime(d) { return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0') }
function scrollBottom() { const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight }
function autoGrow(el) { el.style.height='38px'; el.style.height=Math.min(el.scrollHeight,100)+'px' }
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') }
</script>
</body>
</html>
